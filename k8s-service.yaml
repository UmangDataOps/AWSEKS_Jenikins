apiVersion: v1
kind: Service
metadata:
  name: devops-api
  namespace: production
  labels:
    app: devops-api
    tier: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: ClusterIP
  selector:
    app: devops-api
    tier: backend
  
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: http-direct
      port: 3000
      targetPort: 3000
      protocol: TCP
  
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  
  # Health check on endpoints
  healthCheckNodePort: 30000

---
# Service for inter-pod communication
apiVersion: v1
kind: Service
metadata:
  name: devops-api-headless
  namespace: production
  labels:
    app: devops-api
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  selector:
    app: devops-api
    tier: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-api
  namespace: production
  labels:
    app: devops-api

---
# Role for the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-api
  namespace: production
spec:
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list"]
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-api
  namespace: production
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: devops-api
  subjects:
    - kind: ServiceAccount
      name: devops-api
      namespace: production

---
# Network Policy - Restrict traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devops-api
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: devops-api
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    
    # Allow from other pods in same namespace
    - from:
        - podSelector:
            matchLabels:
              app: devops-api
      ports:
        - protocol: TCP
          port: 3000
    
    # Allow from monitoring stack
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 3000
  
  egress:
    # Allow DNS queries
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    
    # Allow HTTPS to external services
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block AWS metadata service
      ports:
        - protocol: TCP
          port: 443
    
    # Allow HTTP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80
    
    # Allow database connections (if applicable)
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 5432
