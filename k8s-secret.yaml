apiVersion: v1
kind: Secret
metadata:
  name: devops-api-secrets
  namespace: production
  labels:
    app: devops-api
type: Opaque
stringData:
  # Database Credentials (replace with actual values)
  DB_HOST: "postgres.production.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "devops_api_db"
  DB_USER: "api_user"
  DB_PASSWORD: "changeme-secure-password-here"
  
  # API Keys (replace with actual values)
  API_KEY: "your-secure-api-key-here"
  JWT_SECRET: "your-jwt-secret-key-here"
  
  # AWS Credentials (if needed for cross-service communication)
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"

---
# TLS Certificate Secret (for HTTPS on ALB)
