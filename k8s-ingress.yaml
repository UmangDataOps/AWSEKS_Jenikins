apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-api
  namespace: production
  labels:
    app: devops-api
  annotations:
    # AWS ALB Ingress Controller Annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # SSL/TLS Configuration
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS-1-2-2017-01"
    
    # Health Check Configuration
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
    
    # Load Balancer Attributes
    alb.ingress.kubernetes.io/load-balancer-attributes: >
      access_logs.s3.enabled=true,
      access_logs.s3.bucket=devops-alb-logs,
      access_logs.s3.prefix=devops-api,
      idle_timeout.connection.timeout=60,
      routing.http2.enabled=true,
      routing.http.drop_invalid_header_fields.enabled=true
    
    # Security and Performance
    alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:us-east-1:ACCOUNT_ID:global/webacl/devops-api/..."
    alb.ingress.kubernetes.io/shield-advanced-protection: "false"
    
    # Tags for the ALB
    alb.ingress.kubernetes.io/tags: >
      Environment=production,
      Project=devops-api,
      ManagedBy=kubernetes
    
    # Additional configuration
    alb.ingress.kubernetes.io/subnets: "subnet-xxxxx,subnet-yyyyy,subnet-zzzzz"
    alb.ingress.kubernetes.io/security-groups: "sg-xxxxx"
    alb.ingress.kubernetes.io/group.name: "devops-api-group"
    alb.ingress.kubernetes.io/group.order: "1"

spec:
  rules:
    # HTTP Rule
    - host: api.devops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-api
                port:
                  number: 80
    
    # API endpoints
    - host: api.devops.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devops-api
                port:
                  number: 3000
          
          - path: /health
            pathType: Exact
            backend:
              service:
                name: devops-api
                port:
                  number: 3000
          
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: devops-api
                port:
                  number: 3000
    
    # Staging subdomain
    - host: api-staging.devops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-api
                port:
                  number: 80
  
  # TLS Configuration
  tls:
    - hosts:
        - api.devops.example.com
        - api-staging.devops.example.com
      secretName: devops-api-tls

---
# Alternative: Classic Ingress (if ALB controller not available)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-api-nginx
  namespace: production
  labels:
    app: devops-api
    controller: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://devops.example.com"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"

spec:
  rules:
    - host: api.devops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-api
                port:
                  number: 80
  
  tls:
    - hosts:
        - api.devops.example.com
      secretName: devops-api-tls-nginx
